<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gra o Suby!</title>

<style>
body{
background:linear-gradient(135deg,#0b0b1f,#1a0033);
color:white;
font-family:Arial,sans-serif;
margin:0;
text-align:center;
}

h1{
font-size:60px;
color:#ffd700;
margin-top:20px;
}

.container{
max-width:1100px;
margin:auto;
padding:20px;
}

.players{
display:flex;
justify-content:space-between;
font-size:30px;
margin-bottom:20px;
}

.red{color:#ff4d6d;}
.blue{color:#4da6ff;}

.reward{
font-size:35px;
margin:20px 0;
color:#ffdd00;
}

.category{
font-size:25px;
color:#ffcc00;
margin-bottom:10px;
}

.timer{
font-size:50px;
color:#ffd700;
}

.question{
font-size:32px;
margin:30px 0;
}

.answers{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
}

button{
padding:20px;
font-size:25px;
border:none;
border-radius:15px;
cursor:pointer;
color:white;
}

.a{background:#0077ff;}
.b{background:#00b96b;}
.c{background:#d6a400;}
.d{background:#d1002f;}

button:hover{
transform:scale(1.03);
}

#turn{
font-size:25px;
margin-top:20px;
color:#ffcc00;
}
</style>
</head>
<body>

<div class="container">

<h1> GRA O SUBY!</h1>

<div class="reward"> Nagroda: 100 Giftów</div>

<div class="players">
<div class="red"> Lunatyczka<br><span id="p1">0</span> pkt</div>
<div class="blue"> Kaseko<br><span id="p2">0</span> pkt</div>
</div>

<div class="category" id="category">Kategoria: Geografia</div>

<div class="timer" id="timer">45</div>

<div class="question" id="question">
Jakie jest najwyższe pasmo górskie na świecie?
</div>

<div class="answers">
<button class="a" onclick="answer(0)">Himalaje</button>
<button class="b" onclick="answer(1)">Andy</button>
<button class="c" onclick="answer(2)">Alpy</button>
<button class="d" onclick="answer(3)">Kaukaz</button>
</div>

<div id="turn">
Tura: Lunatyczka
</div>

</div>

<script>

let player=1;
let score1=0;
let score2=0;

function answer(x){

if(x===0){

if(player===1){
score1++;
document.getElementById("p1").innerText=score1;
}else{
score2++;
document.getElementById("p2").innerText=score2;
}

alert("Poprawna odpowiedź!");

}else{
alert("Błędna odpowiedź!");
}

player = player===1 ? 2 : 1;

document.getElementById("turn").innerText =
player===1 ? "Tura: Lunatyczka" : "Tura: Kaseko";

}

let time=45;

setInterval(()=>{
time--;
document.getElementById("timer").innerText=time;

if(time<=0){
time=45;
player = player===1 ? 2 : 1;
document.getElementById("turn").innerText =
player===1 ? "Tura: Lunatyczka" : "Tura: Kaseko";
}
},1000);

</script>

</body>
</html>
