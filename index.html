<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Gra o Suby!</title>

<style>

body{
    margin:0;
    font-family:Arial, sans-serif;
    background:black;
    color:white;
}

#startScreen{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
}

  #gameScreen{
      display:none;
      min-height:100vh;
      text-align:center;
     padding:20px;
      display:flex;
      flex-direction:column;
      align-items:center;
  }

h1{
    color:gold;
}

.players{
    display:flex;
    justify-content:space-between;
    margin-top:20px;
    font-size:28px;
}

.info{
    margin-top:30px;
    font-size:25px;
}

#question{
    margin-top:50px;
    font-size:35px;
}

.answers{
    margin-top:40px;
}

.answers button{
    width:220px;
    height:80px;
    margin:10px;
    font-size:30px;
    border:none;
    border-radius:20px;
    cursor:pointer;
}

.startButton{
    font-size:40px;
    padding:20px 60px;
    border:none;
    border-radius:20px;
    background:lime;
    cursor:pointer;
}

</style>
</head>

<body>

<div id="startScreen">

<h1>🏆 GRA O SUBY!</h1>

<h2>❤️ Lunatyczka VS 💙 Kaseko</h2>

<h2>🎁 Nagroda: 100 Giftów</h2>

<button class="startButton" onclick="startGame()">START</button>

</div>

<div id="gameScreen">

<h1>🏆 GRA O SUBY!</h1>

<div class="players">
<div>❤️ Lunatyczka: 0 pkt</div>
<div>💙 Kaseko: 0 pkt</div>
</div>

<div class="info">
🔄 Runda 1 / 40
<br><br>
🌍 Kategoria: Geografia
<br><br>
⏱️ 45 sekund
</div>

<div id="question">
❓ Jaka jest stolica Włoch?
</div>

<div class="answers">

<button>A) Madryt</button>
<button>B) Rzym</button>

<br>

<button>C) Ateny</button>
<button>D) Lizbona</button>

</div>

</div>

<script>

function startGame(){

document.getElementById("startScreen").style.display = "none";

document.getElementById("gameScreen").style.display = "flex";

}

</script>

</body>
</html>
