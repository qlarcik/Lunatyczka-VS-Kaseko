<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏆 O SUBY!</title>

<style>
body{
background:linear-gradient(135deg,#0f0f1f,#1d1035);
color:white;
font-family:Arial;
margin:0;
text-align:center;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

h1{
font-size:60px;
color:gold;
}

.players{
display:flex;
justify-content:space-between;
font-size:35px;
margin-bottom:20px;
}

.red{color:#ff4d4d;}
.blue{color:#4da6ff;}

#category{
font-size:30px;
color:#ffd700;
margin:20px;
}

#timer{
font-size:50px;
color:#ffcc00;
}

#question{
font-size:32px;
margin:30px;
}

.answers{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

button{
font-size:24px;
padding:20px;
border:none;
border-radius:20px;
color:white;
cursor:pointer;
}

.a{background:#2b7cff;}
.b{background:#00b894;}
.c{background:#f1c40f;}
.d{background:#e74c3c;}

button:hover{
transform:scale(1.03);
}

#winner{
font-size:50px;
margin-top:30px;
color:gold;
}
</style>
</head>

<body>

<div class="container">

<h1>🏆 O SUBY!</h1>

<div class="players">
<div class="red">🔴 Lunatyczka<br><span id="p1">0</span> pkt</div>
<div class="blue">🔵 Kaseko<br><span id="p2">0</span> pkt</div>
</div>

<div id="category">🎡 Kategoria</div>
<div id="timer">45</div>

<div id="question">Tutaj pojawi się pytanie</div>

<div class="answers">
<button class="a">Odpowiedź A</button>
<button class="b">Odpowiedź B</button>
<button class="c">Odpowiedź C</button>
<button class="d">Odpowiedź D</button>
</div>

<div id="winner"></div>

</div>

</body>
</html>
